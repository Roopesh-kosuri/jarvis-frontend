<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JARVIS — AUTHORIZATION</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --c:#00ffe7;
  --c2:#ff3cac;
  --c3:#ffe600;
  --bg:#00050f;
  --panel:rgba(0,20,40,0.85);
  --glow:0 0 30px rgba(0,255,231,0.35);
  --glow2:0 0 30px rgba(255,60,172,0.35);
}

html,body{height:100%;overflow:hidden;background:var(--bg);cursor:none;}

/* Custom cursor */
#cursor{
  position:fixed;width:14px;height:14px;
  border:1.5px solid var(--c);
  border-radius:50%;pointer-events:none;z-index:9999;
  transition:transform 0.1s;
  box-shadow:var(--glow);
}
#cursor::after{
  content:'';position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:3px;height:3px;border-radius:50%;
  background:var(--c);
}

/* Canvas bg */
canvas{position:fixed;inset:0;z-index:0;}

/* Scanlines */
.scanlines{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  background:repeating-linear-gradient(
    0deg,transparent,transparent 3px,
    rgba(0,0,0,0.1) 3px,rgba(0,0,0,0.1) 4px
  );
}

/* Vignette */
.vignette{
  position:fixed;inset:0;z-index:2;pointer-events:none;
  background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,0.85) 100%);
}

/* HUD corners */
.hud{position:fixed;inset:0;z-index:3;pointer-events:none;}
.hud-corner{position:absolute;width:60px;height:60px;}
.hud-corner::before,.hud-corner::after{content:'';position:absolute;background:var(--c);box-shadow:var(--glow);}
.hud-corner::before{width:2px;height:100%;}
.hud-corner::after{width:100%;height:2px;}
.hud-corner.tl{top:20px;left:20px;}
.hud-corner.tr{top:20px;right:20px;transform:scaleX(-1);}
.hud-corner.bl{bottom:20px;left:20px;transform:scaleY(-1);}
.hud-corner.br{bottom:20px;right:20px;transform:scale(-1);}

.hud-top{
  position:absolute;top:20px;left:50%;transform:translateX(-50%);
  font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:4px;
  color:rgba(0,255,231,0.4);
  animation:blink 3s infinite;
}
.hud-bot{
  position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
  font-family:'Rajdhani',sans-serif;font-size:10px;letter-spacing:3px;
  color:rgba(0,255,231,0.25);
}
@keyframes blink{0%,100%{opacity:0.4}50%{opacity:1}}

/* Main layout */
.stage{
  position:fixed;inset:0;z-index:10;
  display:flex;align-items:center;justify-content:center;
}

.panel{
  width:420px;
  background:var(--panel);
  border:1px solid rgba(0,255,231,0.2);
  backdrop-filter:blur(24px);
  position:relative;
  animation:panelIn 1.2s cubic-bezier(0.16,1,0.3,1) both;
  overflow:hidden;
}

@keyframes panelIn{
  from{opacity:0;transform:translateY(40px) scale(0.95);}
  to{opacity:1;transform:translateY(0) scale(1);}
}

/* Panel top bar */
.panel-bar{
  height:3px;
  background:linear-gradient(90deg,transparent,var(--c),var(--c2),var(--c),transparent);
  animation:barScan 3s linear infinite;
  background-size:200% 100%;
}
@keyframes barScan{
  0%{background-position:200% 0}
  100%{background-position:-200% 0}
}

.panel-inner{padding:40px 40px 44px;}

/* Logo */
.logo-wrap{text-align:center;margin-bottom:36px;}
.logo-hex{
  width:70px;height:70px;
  border:2px solid rgba(0,255,231,0.3);
  border-radius:4px;
  margin:0 auto 16px;
  display:flex;align-items:center;justify-content:center;
  position:relative;
  animation:hexPulse 4s ease infinite;
}
.logo-hex::before{
  content:'';position:absolute;inset:-6px;
  border:1px solid rgba(0,255,231,0.1);
  border-radius:6px;
  animation:hexPulse 4s ease infinite reverse;
}
@keyframes hexPulse{
  0%,100%{box-shadow:0 0 20px rgba(0,255,231,0.2);}
  50%{box-shadow:0 0 50px rgba(0,255,231,0.5),inset 0 0 20px rgba(0,255,231,0.1);}
}
.logo-hex svg{width:32px;height:32px;fill:none;stroke:var(--c);stroke-width:1.5;}

.logo-name{
  font-family:'Orbitron',sans-serif;
  font-size:26px;font-weight:900;
  letter-spacing:10px;color:var(--c);
  text-shadow:0 0 30px rgba(0,255,231,0.6),0 0 60px rgba(0,255,231,0.3);
}
.logo-sub{
  font-family:'Rajdhani',sans-serif;
  font-size:10px;letter-spacing:4px;
  color:rgba(0,255,231,0.4);
  margin-top:4px;
}

/* Divider */
.divider{
  display:flex;align-items:center;gap:10px;
  margin-bottom:24px;
}
.divider-line{flex:1;height:1px;background:rgba(0,255,231,0.15);}
.divider-text{
  font-family:'Rajdhani',sans-serif;
  font-size:10px;letter-spacing:3px;
  color:rgba(0,255,231,0.3);
}

/* Google button */
.google-btn{
  width:100%;padding:14px 20px;
  background:rgba(0,255,231,0.04);
  border:1px solid rgba(0,255,231,0.25);
  color:#c8f0ef;
  font-family:'Rajdhani',sans-serif;
  font-size:14px;font-weight:600;letter-spacing:2px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:12px;
  transition:all 0.3s;
  position:relative;overflow:hidden;
}
.google-btn::before{
  content:'';position:absolute;
  top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(0,255,231,0.08),transparent);
  transition:left 0.5s;
}
.google-btn:hover::before{left:100%;}
.google-btn:hover{
  border-color:var(--c);
  color:var(--c);
  box-shadow:var(--glow),inset 0 0 20px rgba(0,255,231,0.05);
}
.google-btn svg{width:18px;height:18px;flex-shrink:0;}

/* Or separator */
.or-row{
  display:flex;align-items:center;gap:12px;
  margin:20px 0;
}
.or-line{flex:1;height:1px;background:rgba(255,255,255,0.06);}
.or-text{
  font-family:'Rajdhani',sans-serif;
  font-size:10px;letter-spacing:3px;
  color:rgba(255,255,255,0.2);
}

/* Input fields */
.field{margin-bottom:14px;position:relative;}
.field label{
  display:block;
  font-family:'Rajdhani',sans-serif;
  font-size:10px;letter-spacing:3px;
  color:rgba(0,255,231,0.45);
  margin-bottom:6px;
}
.field input{
  width:100%;padding:12px 14px;
  background:rgba(0,255,231,0.03);
  border:1px solid rgba(0,255,231,0.15);
  color:#c8f0ef;
  font-family:'Rajdhani',sans-serif;
  font-size:14px;letter-spacing:1px;
  outline:none;
  transition:all 0.3s;
}
.field input::placeholder{color:rgba(0,255,231,0.2);}
.field input:focus{
  border-color:rgba(0,255,231,0.5);
  background:rgba(0,255,231,0.06);
  box-shadow:var(--glow);
}

/* Submit btn */
.submit-btn{
  width:100%;padding:14px;margin-top:6px;
  background:rgba(0,255,231,0.1);
  border:1px solid var(--c);
  color:var(--c);
  font-family:'Orbitron',sans-serif;
  font-size:11px;font-weight:700;letter-spacing:4px;
  cursor:pointer;
  position:relative;overflow:hidden;
  transition:all 0.3s;
  box-shadow:var(--glow);
  text-shadow:0 0 10px rgba(0,255,231,0.5);
}
.submit-btn::before{
  content:'';position:absolute;
  top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(0,255,231,0.15),transparent);
  transition:left 0.4s;
}
.submit-btn:hover::before{left:100%;}
.submit-btn:hover{
  background:rgba(0,255,231,0.18);
  box-shadow:0 0 50px rgba(0,255,231,0.5);
}

/* Toggle */
.toggle-row{
  text-align:center;margin-top:20px;
  font-family:'Rajdhani',sans-serif;
  font-size:12px;letter-spacing:1px;
  color:rgba(255,255,255,0.25);
}
.toggle-row a{
  color:rgba(0,255,231,0.6);cursor:pointer;
  text-decoration:none;transition:color 0.2s;
}
.toggle-row a:hover{color:var(--c);}

/* Status line */
.status-line{
  position:absolute;bottom:0;left:0;right:0;
  height:2px;
  background:linear-gradient(90deg,var(--c2),var(--c),var(--c2));
  background-size:200%;
  animation:statusAnim 2s linear infinite;
  opacity:0.5;
}
@keyframes statusAnim{
  0%{background-position:0%}100%{background-position:200%}
}

/* Panel corner marks */
.p-corner{position:absolute;width:14px;height:14px;}
.p-corner::before,.p-corner::after{content:'';position:absolute;background:var(--c);}
.p-corner::before{width:1.5px;height:100%;}
.p-corner::after{width:100%;height:1.5px;}
.p-corner.tl{top:0;left:0;}
.p-corner.tr{top:0;right:0;transform:scaleX(-1);}
.p-corner.bl{bottom:0;left:0;transform:scaleY(-1);}
.p-corner.br{bottom:0;right:0;transform:scale(-1);}

/* Loading overlay */
.loading{
  position:fixed;inset:0;z-index:100;
  background:var(--bg);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  transition:opacity 0.6s;
}
.loading.hide{opacity:0;pointer-events:none;}
.load-text{
  font-family:'Orbitron',sans-serif;
  font-size:11px;letter-spacing:6px;color:var(--c);
  text-shadow:var(--glow);
  animation:blink 0.8s infinite;
}
.load-bar{
  width:200px;height:1px;
  background:rgba(0,255,231,0.1);
  margin-top:20px;overflow:hidden;
}
.load-fill{
  height:100%;background:var(--c);
  box-shadow:var(--glow);
  animation:loadFill 1.4s ease forwards;
}
@keyframes loadFill{from{width:0}to{width:100%}}

/* Mode toggle (sign in / sign up) */
.mode-signin,.mode-signup{display:none;}
.mode-signin.active,.mode-signup.active{display:block;}
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="load-text">INITIALIZING JARVIS</div>
  <div class="load-bar"><div class="load-fill"></div></div>
</div>

<div id="cursor"></div>
<canvas id="bg"></canvas>
<div class="scanlines"></div>
<div class="vignette"></div>

<div class="hud">
  <div class="hud-corner tl"></div>
  <div class="hud-corner tr"></div>
  <div class="hud-corner bl"></div>
  <div class="hud-corner br"></div>
  <div class="hud-top">JARVIS NEURAL INTERFACE v4.1 // AUTHORIZATION REQUIRED</div>
  <div class="hud-bot" id="hudBot">SYS_READY &nbsp;|&nbsp; AWAITING BIOMETRIC INPUT</div>
</div>

<div class="stage">
  <div class="panel">
    <div class="p-corner tl"></div>
    <div class="p-corner tr"></div>
    <div class="p-corner bl"></div>
    <div class="p-corner br"></div>
    <div class="panel-bar"></div>
    <div class="panel-inner">

      <div class="logo-wrap">
        <div class="logo-hex">
          <svg viewBox="0 0 40 40">
            <polygon points="20,4 36,13 36,27 20,36 4,27 4,13" stroke-linejoin="round"/>
            <circle cx="20" cy="20" r="6"/>
            <line x1="20" y1="4" x2="20" y2="14"/>
            <line x1="20" y1="26" x2="20" y2="36"/>
            <line x1="4" y1="13" x2="13" y2="18"/>
            <line x1="27" y1="22" x2="36" y2="27"/>
            <line x1="36" y1="13" x2="27" y2="18"/>
            <line x1="13" y1="22" x2="4" y2="27"/>
          </svg>
        </div>
        <div class="logo-name">JARVIS</div>
        <div class="logo-sub">JUST A RATHER VERY INTELLIGENT SYSTEM</div>
      </div>

      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-text">IDENTITY VERIFICATION</div>
        <div class="divider-line"></div>
      </div>

      <!-- Google Sign In -->
      <button class="google-btn" onclick="googleLogin()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        AUTHENTICATE WITH GOOGLE
      </button>

      <div class="or-row">
        <div class="or-line"></div>
        <div class="or-text">OR</div>
        <div class="or-line"></div>
      </div>

      <!-- Sign In form -->
      <div class="mode-signin active" id="signinForm">
        <div class="field">
          <label>ACCESS ID — EMAIL</label>
          <input type="email" placeholder="operator@domain.com" id="email"/>
        </div>
        <div class="field">
          <label>SECURITY KEY — PASSWORD</label>
          <input type="password" placeholder="••••••••••••" id="pass"/>
        </div>
        <button class="submit-btn" onclick="emailLogin()">INITIATE ACCESS</button>
        <div class="toggle-row">
          No account? <a onclick="toggleMode('signup')">Register operator</a>
        </div>
      </div>

      <!-- Sign Up form -->
      <div class="mode-signup" id="signupForm">
        <div class="field">
          <label>OPERATOR NAME</label>
          <input type="text" placeholder="Your name" id="name"/>
        </div>
        <div class="field">
          <label>ACCESS ID — EMAIL</label>
          <input type="email" placeholder="operator@domain.com" id="email2"/>
        </div>
        <div class="field">
          <label>SECURITY KEY — PASSWORD</label>
          <input type="password" placeholder="Min 8 characters" id="pass2"/>
        </div>
        <button class="submit-btn" onclick="emailSignup()">CREATE OPERATOR PROFILE</button>
        <div class="toggle-row">
          Already registered? <a onclick="toggleMode('signin')">Sign in</a>
        </div>
      </div>

    </div>
    <div class="status-line"></div>
  </div>
</div>

<script>
// ── Config ─────────────────────────────────────────────────────────
// Replace this with your actual Firebase config after setup (Step 3 below)
const FIREBASE_CONFIG = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
};

// ── Cursor ─────────────────────────────────────────────────────────
const cursor = document.getElementById("cursor");
document.addEventListener("mousemove", e => {
  cursor.style.left = e.clientX - 7 + "px";
  cursor.style.top  = e.clientY - 7 + "px";
});

// ── Canvas background — particle grid ─────────────────────────────
const canvas = document.getElementById("bg");
const ctx    = canvas.getContext("2d");
let W, H, particles = [];

function resize(){
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  initParticles();
}

function initParticles(){
  particles = [];
  const count = Math.floor((W * H) / 14000);
  for(let i = 0; i < count; i++){
    particles.push({
      x: Math.random()*W, y: Math.random()*H,
      vx:(Math.random()-0.5)*0.3, vy:(Math.random()-0.5)*0.3,
      size: Math.random()*1.5+0.3,
      alpha: Math.random()*0.5+0.1
    });
  }
}

function drawParticles(){
  ctx.clearRect(0,0,W,H);
  // Grid lines
  ctx.strokeStyle = "rgba(0,255,231,0.03)";
  ctx.lineWidth = 1;
  const step = 60;
  for(let x=0;x<W;x+=step){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=step){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  // Particles + connections
  particles.forEach((p,i) => {
    p.x += p.vx; p.y += p.vy;
    if(p.x<0||p.x>W) p.vx*=-1;
    if(p.y<0||p.y>H) p.vy*=-1;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fillStyle = `rgba(0,255,231,${p.alpha})`;
    ctx.fill();
    for(let j=i+1;j<particles.length;j++){
      const d = Math.hypot(p.x-particles[j].x, p.y-particles[j].y);
      if(d<120){
        ctx.beginPath();
        ctx.moveTo(p.x,p.y);ctx.lineTo(particles[j].x,particles[j].y);
        ctx.strokeStyle = `rgba(0,255,231,${0.07*(1-d/120)})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  });
  requestAnimationFrame(drawParticles);
}
window.addEventListener("resize", resize);
resize();
drawParticles();

// ── Loading screen ─────────────────────────────────────────────────
setTimeout(() => {
  document.getElementById("loading").classList.add("hide");
}, 1600);

// ── HUD clock ──────────────────────────────────────────────────────
function updateHud(){
  const now = new Date();
  const t = now.toTimeString().split(" ")[0];
  document.getElementById("hudBot").textContent =
    `SYS_READY  |  ${t}  |  AWAITING INPUT`;
}
setInterval(updateHud, 1000);

// ── Toggle sign in / sign up ───────────────────────────────────────
function toggleMode(mode){
  document.getElementById("signinForm").classList.toggle("active", mode==="signin");
  document.getElementById("signupForm").classList.toggle("active", mode==="signup");
}

// ── Auth functions (wire up Firebase after setup) ──────────────────
function googleLogin(){
  // After Firebase setup, replace with:
  // const provider = new firebase.auth.GoogleAuthProvider();
  // firebase.auth().signInWithPopup(provider).then(() => window.location.href = "index.html");
  alert("Firebase not configured yet! Follow the setup steps in README.md");
}

function emailLogin(){
  const email = document.getElementById("email").value;
  const pass  = document.getElementById("pass").value;
  if(!email || !pass){ alert("Fill in all fields"); return; }
  // After Firebase setup:
  // firebase.auth().signInWithEmailAndPassword(email, pass)
  //   .then(() => window.location.href = "index.html")
  //   .catch(e => alert(e.message));
  alert("Firebase not configured yet! Follow the setup steps in README.md");
}

function emailSignup(){
  const name  = document.getElementById("name").value;
  const email = document.getElementById("email2").value;
  const pass  = document.getElementById("pass2").value;
  if(!name || !email || !pass){ alert("Fill in all fields"); return; }
  // After Firebase setup:
  // firebase.auth().createUserWithEmailAndPassword(email, pass)
  //   .then(() => window.location.href = "index.html")
  //   .catch(e => alert(e.message));
  alert("Firebase not configured yet! Follow the setup steps in README.md");
}
</script>
</body>
