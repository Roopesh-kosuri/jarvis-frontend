<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JARVIS</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --c:#00ffe7;--c2:#ff3cac;--bg:#00050f;
  --panel:rgba(0,15,30,0.9);
  --border:rgba(0,255,231,0.18);
  --glow:0 0 24px rgba(0,255,231,0.3);
  --text:#b8dfe8;
}
html,body{height:100%;overflow:hidden;background:var(--bg);cursor:none;}

#cursor{position:fixed;width:12px;height:12px;border:1.5px solid var(--c);border-radius:50%;pointer-events:none;z-index:9999;box-shadow:var(--glow);}
#cursor::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:3px;height:3px;border-radius:50%;background:var(--c);}

canvas{position:fixed;inset:0;z-index:0;}
.scanlines{position:fixed;inset:0;z-index:1;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.08) 3px,rgba(0,0,0,0.08) 4px);}
.vignette{position:fixed;inset:0;z-index:2;pointer-events:none;background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,0.8) 100%);}

/* Layout */
.app{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;}

/* Header */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 24px;
  border-bottom:1px solid var(--border);
  background:rgba(0,10,20,0.92);
  backdrop-filter:blur(12px);
}
.logo{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;letter-spacing:6px;color:var(--c);text-shadow:var(--glow);}
.logo span{color:var(--c2);}

.header-mid{display:flex;align-items:center;gap:8px;font-family:'Rajdhani',sans-serif;font-size:11px;letter-spacing:2px;color:rgba(0,255,231,0.35);}
.dot{width:7px;height:7px;border-radius:50%;background:#00ff88;box-shadow:0 0 8px #00ff88;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

.header-right{display:flex;align-items:center;gap:10px;}

.user-chip{
  display:flex;align-items:center;gap:8px;
  padding:5px 12px 5px 6px;
  border:1px solid var(--border);
  background:rgba(0,255,231,0.04);
  font-family:'Rajdhani',sans-serif;
  font-size:12px;letter-spacing:1px;color:rgba(0,255,231,0.5);
}
.user-avatar{
  width:24px;height:24px;border-radius:50%;
  border:1px solid rgba(0,255,231,0.3);
  object-fit:cover;
}
.user-avatar-placeholder{
  width:24px;height:24px;border-radius:50%;
  border:1px solid rgba(0,255,231,0.3);
  background:rgba(0,255,231,0.1);
  display:flex;align-items:center;justify-content:center;
  font-family:'Orbitron',sans-serif;font-size:9px;color:var(--c);
}

.hdr-btn{
  background:none;border:1px solid var(--border);
  color:rgba(0,255,231,0.4);padding:5px 12px;
  font-family:'Rajdhani',sans-serif;font-size:11px;letter-spacing:2px;
  cursor:pointer;transition:all 0.2s;
}
.hdr-btn:hover{border-color:var(--c);color:var(--c);box-shadow:var(--glow);}
.hdr-btn.active{border-color:var(--c);color:var(--c);background:rgba(0,255,231,0.08);}

.logout-btn{
  background:none;border:1px solid rgba(255,60,172,0.25);
  color:rgba(255,60,172,0.45);padding:5px 12px;
  font-family:'Rajdhani',sans-serif;font-size:11px;letter-spacing:2px;
  cursor:pointer;transition:all 0.2s;
}
.logout-btn:hover{border-color:var(--c2);color:var(--c2);box-shadow:0 0 20px rgba(255,60,172,0.3);}

/* Chat */
#chat{
  flex:1;overflow-y:auto;padding:20px 24px;
  display:flex;flex-direction:column;gap:14px;
  scroll-behavior:smooth;
}
#chat::-webkit-scrollbar{width:3px;}
#chat::-webkit-scrollbar-thumb{background:rgba(0,255,231,0.2);border-radius:2px;}

.msg{display:flex;gap:10px;animation:msgIn 0.3s ease;max-width:780px;}
.msg.user{align-self:flex-end;flex-direction:row-reverse;}
.msg.jarvis{align-self:flex-start;}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.av{
  width:34px;height:34px;border-radius:3px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'Orbitron',sans-serif;font-size:8px;font-weight:700;letter-spacing:1px;
}
.msg.user .av{background:rgba(255,60,172,0.12);border:1px solid rgba(255,60,172,0.3);color:var(--c2);}
.msg.jarvis .av{background:rgba(0,255,231,0.07);border:1px solid var(--border);color:var(--c);}

.bubble{
  padding:11px 15px;font-family:'Share Tech Mono',monospace;
  font-size:13px;line-height:1.7;max-width:640px;
}
.msg.user .bubble{
  background:rgba(255,60,172,0.07);border:1px solid rgba(255,60,172,0.2);
  border-radius:2px 0 2px 2px;color:#f0c0d8;
}
.msg.jarvis .bubble{
  background:var(--panel);border:1px solid var(--border);
  border-radius:0 2px 2px 2px;color:var(--text);
}

.action-pill{
  margin-top:8px;padding:5px 10px;
  background:rgba(0,255,136,0.07);
  border:1px solid rgba(0,255,136,0.2);
  color:#00ff88;font-size:11px;letter-spacing:1px;
  font-family:'Rajdhani',sans-serif;
}

/* Typing */
.typing{display:flex;align-items:center;gap:4px;padding:14px 15px;background:var(--panel);border:1px solid var(--border);}
.typing span{width:5px;height:5px;border-radius:50%;background:var(--c);animation:ty 1.2s infinite;}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes ty{0%,80%,100%{transform:translateY(0);opacity:.3}40%{transform:translateY(-5px);opacity:1}}

/* Boot */
.boot{text-align:center;padding:40px 0;animation:msgIn 1s ease;}
.boot-title{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;color:var(--c);text-shadow:var(--glow);letter-spacing:8px;}
.boot-line{width:160px;height:1px;background:linear-gradient(to right,transparent,var(--c),transparent);margin:14px auto;}
.boot-sub{font-family:'Rajdhani',sans-serif;font-size:11px;letter-spacing:3px;color:rgba(0,255,231,0.3);}

/* Footer */
footer{
  padding:14px 24px 18px;
  border-top:1px solid var(--border);
  background:rgba(0,10,20,0.92);
  backdrop-filter:blur(12px);
}
.input-row{display:flex;gap:8px;align-items:center;}
.pfx{color:var(--c);font-family:'Share Tech Mono',monospace;font-size:13px;letter-spacing:2px;text-shadow:var(--glow);}

#inp{
  flex:1;background:rgba(0,255,231,0.03);
  border:1px solid var(--border);color:var(--text);
  font-family:'Share Tech Mono',monospace;font-size:13px;
  padding:11px 14px;outline:none;transition:all 0.2s;
}
#inp:focus{border-color:rgba(0,255,231,0.4);box-shadow:var(--glow);background:rgba(0,255,231,0.05);}
#inp::placeholder{color:rgba(0,255,231,0.2);}

.send{
  background:rgba(0,255,231,0.08);border:1px solid var(--c);
  color:var(--c);padding:11px 20px;
  font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;
  cursor:pointer;transition:all 0.2s;box-shadow:var(--glow);
}
.send:hover{background:rgba(0,255,231,0.16);box-shadow:0 0 40px rgba(0,255,231,0.5);}
.send:disabled{opacity:.35;cursor:not-allowed;}

.hints{display:flex;gap:14px;margin-top:8px;flex-wrap:wrap;}
.hint{font-family:'Rajdhani',sans-serif;font-size:10px;letter-spacing:2px;color:rgba(0,255,231,0.2);cursor:pointer;transition:color 0.2s;}
.hint:hover{color:rgba(0,255,231,0.5);}

/* Corners */
.hud{position:fixed;inset:0;z-index:3;pointer-events:none;}
.hc{position:absolute;width:50px;height:50px;}
.hc::before,.hc::after{content:'';position:absolute;background:var(--c);opacity:.4;}
.hc::before{width:2px;height:100%;}
.hc::after{width:100%;height:2px;}
.hc.tl{top:14px;left:14px}.hc.tr{top:14px;right:14px;transform:scaleX(-1)}
.hc.bl{bottom:14px;left:14px;transform:scaleY(-1)}.hc.br{bottom:14px;right:14px;transform:scale(-1)}
</style>
</head>
<body>

<div id="cursor"></div>
<canvas id="bg"></canvas>
<div class="scanlines"></div>
<div class="vignette"></div>
<div class="hud">
  <div class="hc tl"></div><div class="hc tr"></div>
  <div class="hc bl"></div><div class="hc br"></div>
</div>

<div class="app">
  <header>
    <div class="logo">J<span>A</span>RVIS</div>
    <div class="header-mid">
      <div class="dot"></div>
      <span id="statusText">SYSTEMS ONLINE</span>
    </div>
    <div class="header-right">
      <div class="user-chip">
        <div class="user-avatar-placeholder" id="userInitial">?</div>
        <span id="userName">OPERATOR</span>
      </div>
      <button class="hdr-btn" id="webBtn" onclick="toggleWeb()">🌐 WEB: OFF</button>
      <button class="hdr-btn" onclick="clearChat()">CLEAR</button>
      <button class="logout-btn" onclick="logout()">LOGOUT</button>
    </div>
  </header>

  <div id="chat">
    <div class="boot">
      <div class="boot-title">JARVIS ONLINE</div>
      <div class="boot-line"></div>
      <div class="boot-sub">ALL SYSTEMS NOMINAL — READY FOR INPUT</div>
    </div>
  </div>

  <footer>
    <div class="input-row">
      <span class="pfx">&gt;_</span>
      <input id="inp" type="text" placeholder="Enter command or query..." autocomplete="off"/>
      <button class="send" id="sendBtn" onclick="send()">SEND</button>
    </div>
    <div class="hints">
      <span class="hint" onclick="useHint(this)">open chrome</span>
      <span class="hint" onclick="useHint(this)">open downloads</span>
      <span class="hint" onclick="useHint(this)">latest news today</span>
      <span class="hint" onclick="useHint(this)">what's the weather in Delhi?</span>
      <span class="hint" onclick="useHint(this)">run ipconfig</span>
    </div>
  </footer>
</div>

<script>
// ── Replace with your actual backend URL after Render deployment ───
const API = "https://jarvis-backend-1-jttj.onrender.com";

// ── Cursor ────────────────────────────────────────────────────────
const cur = document.getElementById("cursor");
document.addEventListener("mousemove", e => {
  cur.style.left = e.clientX-6+"px";
  cur.style.top  = e.clientY-6+"px";
});

// ── Canvas ────────────────────────────────────────────────────────
const canvas=document.getElementById("bg"),ctx=canvas.getContext("2d");
let W,H,pts=[];
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;initPts();}
function initPts(){pts=[];const n=Math.floor(W*H/16000);for(let i=0;i<n;i++)pts.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.25,a:Math.random()*.4+.1});}
function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle="rgba(0,255,231,0.025)";ctx.lineWidth=1;
  for(let x=0;x<W;x+=70){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=70){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  pts.forEach((p,i)=>{
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0||p.x>W)p.vx*=-1;if(p.y<0||p.y>H)p.vy*=-1;
    ctx.beginPath();ctx.arc(p.x,p.y,1,0,Math.PI*2);
    ctx.fillStyle=`rgba(0,255,231,${p.a})`;ctx.fill();
    for(let j=i+1;j<pts.length;j++){
      const d=Math.hypot(p.x-pts[j].x,p.y-pts[j].y);
      if(d<110){ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(pts[j].x,pts[j].y);
      ctx.strokeStyle=`rgba(0,255,231,${.06*(1-d/110)})`;ctx.lineWidth=.5;ctx.stroke();}
    }
  });
  requestAnimationFrame(draw);
}
window.addEventListener("resize",resize);resize();draw();

// ── Clock ─────────────────────────────────────────────────────────
setInterval(()=>{
  const t=new Date().toTimeString().split(" ")[0];
  document.getElementById("statusText").textContent=`ONLINE  |  ${t}`;
},1000);

// ── Auth check (wire up Firebase) ─────────────────────────────────
// Uncomment after Firebase setup:
// firebase.auth().onAuthStateChanged(user => {
//   if(!user){ window.location.href="login.html"; return; }
//   document.getElementById("userName").textContent = user.displayName?.toUpperCase() || user.email.split("@")[0].toUpperCase();
//   document.getElementById("userInitial").textContent = (user.displayName||user.email)[0].toUpperCase();
// });

// Demo user display
document.getElementById("userName").textContent = "OPERATOR";
document.getElementById("userInitial").textContent = "OP";

function logout(){
  // firebase.auth().signOut().then(()=>window.location.href="login.html");
  window.location.href="login.html";
}

// ── Chat ──────────────────────────────────────────────────────────
const chatEl=document.getElementById("chat");
const inp=document.getElementById("inp");
const sendBtn=document.getElementById("sendBtn");
let webSearch=false;

inp.addEventListener("keydown",e=>{if(e.key==="Enter")send();});

function toggleWeb(){
  webSearch=!webSearch;
  const b=document.getElementById("webBtn");
  b.textContent=`🌐 WEB: ${webSearch?"ON":"OFF"}`;
  b.classList.toggle("active",webSearch);
}

function useHint(el){inp.value=el.textContent;inp.focus();}

async function clearChat(){
  await fetch(`${API}/history`,{method:"DELETE"}).catch(()=>{});
  chatEl.innerHTML=`<div class="boot"><div class="boot-title">JARVIS ONLINE</div><div class="boot-line"></div><div class="boot-sub">MEMORY CLEARED</div></div>`;
}

function addMsg(role,text,action){
  const m=document.createElement("div");m.className=`msg ${role}`;
  const av=document.createElement("div");av.className="av";
  av.textContent=role==="user"?"YOU":"J.A.R";
  const b=document.createElement("div");b.className="bubble";
  b.innerHTML=fmt(text);
  if(action){const t=document.createElement("div");t.className="action-pill";t.textContent=`⚡ ${action}`;b.appendChild(t);}
  m.appendChild(av);m.appendChild(b);
  chatEl.appendChild(m);chatEl.scrollTop=chatEl.scrollHeight;
}

function fmt(t){
  return t
    .replace(/\*\*(.*?)\*\*/g,'<strong style="color:var(--c)">$1</strong>')
    .replace(/`(.*?)`/g,'<code style="background:rgba(0,255,231,0.1);padding:1px 5px;color:#9ee">$1</code>')
    .replace(/\n/g,'<br>');
}

function showTyping(){
  const m=document.createElement("div");m.className="msg jarvis";m.id="typing";
  const av=document.createElement("div");av.className="av";av.textContent="J.A.R";
  const b=document.createElement("div");b.className="typing";
  b.innerHTML="<span></span><span></span><span></span>";
  m.appendChild(av);m.appendChild(b);chatEl.appendChild(m);
  chatEl.scrollTop=chatEl.scrollHeight;
}
function hideTyping(){const t=document.getElementById("typing");if(t)t.remove();}

async function send(){
  const text=inp.value.trim();if(!text)return;
  inp.value="";sendBtn.disabled=true;
  addMsg("user",text);showTyping();
  try{
    const r=await fetch(`${API}/chat`,{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:text,use_web_search:webSearch})
    });
    hideTyping();
    if(!r.ok){const e=await r.json();addMsg("jarvis",`❌ Error: ${e.detail}`);}
    else{const d=await r.json();addMsg("jarvis",d.reply,d.action_taken);}
  }catch(e){
    hideTyping();
    addMsg("jarvis","❌ Cannot reach backend.\n\nMake sure it's running on **localhost:8000** or update the API URL at the top of this file.");
  }
  sendBtn.disabled=false;inp.focus();
}
</script>
</body>
</html>
