<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JARVIS — Intelligent Interface</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&family=Exo+2:wght@200;300;400&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --c: #00f5d4;
  --c2: #ff2d78;
  --c3: #7b5ea7;
  --gold: #ffd166;
  --bg: #020914;
  --bg2: #050f1e;
  --panel: rgba(5,18,40,0.92);
  --glass: rgba(0,245,212,0.04);
  --border: rgba(0,245,212,0.12);
  --border2: rgba(0,245,212,0.25);
  --text: #a8d4df;
  --text2: #5a8fa0;
  --glow: 0 0 30px rgba(0,245,212,0.25);
  --glow2: 0 0 30px rgba(255,45,120,0.25);
  --font-head: 'Syne', sans-serif;
  --font-mono: 'Space Mono', monospace;
  --font-body: 'Exo 2', sans-serif;
}

html, body { height:100%; overflow:hidden; background:var(--bg); cursor:none; }

/* ── Custom Cursor ── */
#cursor {
  position:fixed; width:8px; height:8px; border-radius:50%;
  background:var(--c); pointer-events:none; z-index:9999;
  transition:transform 0.08s ease;
  box-shadow: 0 0 15px var(--c), 0 0 30px rgba(0,245,212,0.4);
  mix-blend-mode:screen;
}
#cursor-ring {
  position:fixed; width:32px; height:32px; border-radius:50%;
  border:1px solid rgba(0,245,212,0.4); pointer-events:none; z-index:9998;
  transform:translate(-50%,-50%);
  transition:width 0.3s, height 0.3s, border-color 0.3s, left 0.12s ease, top 0.12s ease;
}
#cursor-ring.hover { width:48px; height:48px; border-color:var(--c); }

/* ── Canvas BG ── */
canvas { position:fixed; inset:0; z-index:0; }

/* ── Overlay FX ── */
.noise {
  position:fixed; inset:0; z-index:1; pointer-events:none; opacity:0.035;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-size:180px;
}
.scanlines {
  position:fixed; inset:0; z-index:2; pointer-events:none;
  background:repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 3px);
}
.vignette {
  position:fixed; inset:0; z-index:2; pointer-events:none;
  background:radial-gradient(ellipse at 50% 50%, transparent 40%, rgba(0,0,0,0.85) 100%);
}
.chromatic {
  position:fixed; inset:0; z-index:2; pointer-events:none;
  background:linear-gradient(135deg, rgba(0,245,212,0.012) 0%, transparent 50%, rgba(255,45,120,0.012) 100%);
}

/* ── HUD Corners ── */
.hud { position:fixed; inset:0; z-index:3; pointer-events:none; }
.hc {
  position:absolute; width:44px; height:44px;
  border-color:rgba(0,245,212,0.3); border-style:solid;
}
.hc.tl { top:18px; left:18px; border-width:1.5px 0 0 1.5px; }
.hc.tr { top:18px; right:18px; border-width:1.5px 1.5px 0 0; }
.hc.bl { bottom:18px; left:18px; border-width:0 0 1.5px 1.5px; }
.hc.br { bottom:18px; right:18px; border-width:0 1.5px 1.5px 0; }
.hc::before {
  content:'';position:absolute;
  background:var(--c); opacity:0.5;
}
.hc.tl::before { top:-1.5px; left:6px; width:14px; height:1.5px; }
.hc.tr::before { top:-1.5px; right:6px; width:14px; height:1.5px; }
.hc.bl::before { bottom:-1.5px; left:6px; width:14px; height:1.5px; }
.hc.br::before { bottom:-1.5px; right:6px; width:14px; height:1.5px; }

/* ── Side meters ── */
.side-meter {
  position:fixed; top:50%; transform:translateY(-50%);
  z-index:3; pointer-events:none;
  display:flex; flex-direction:column; gap:3px;
  opacity:0.35;
}
.side-meter.left { left:10px; align-items:flex-start; }
.side-meter.right { right:10px; align-items:flex-end; }
.meter-bar {
  height:3px; background:var(--c);
  border-radius:2px;
  animation:meterPulse 2.5s ease-in-out infinite;
}
.meter-bar:nth-child(1) { width:16px; animation-delay:0s; }
.meter-bar:nth-child(2) { width:24px; animation-delay:0.2s; }
.meter-bar:nth-child(3) { width:10px; animation-delay:0.4s; }
.meter-bar:nth-child(4) { width:28px; animation-delay:0.6s; }
.meter-bar:nth-child(5) { width:18px; animation-delay:0.8s; }
.meter-bar:nth-child(6) { width:8px; animation-delay:1.0s; }
.meter-bar:nth-child(7) { width:22px; animation-delay:1.2s; }
@keyframes meterPulse {
  0%,100% { opacity:0.3; }
  50% { opacity:1; }
}

/* ── App Shell ── */
.app { position:fixed; inset:0; z-index:10; display:flex; flex-direction:column; }

/* ── Header ── */
header {
  display:flex; align-items:center; justify-content:space-between;
  padding:0 28px; height:62px;
  border-bottom:1px solid var(--border);
  background:linear-gradient(180deg, rgba(2,9,20,0.98) 0%, rgba(3,12,28,0.92) 100%);
  backdrop-filter:blur(20px);
  position:relative;
}
header::after {
  content:'';
  position:absolute; bottom:0; left:5%; right:5%; height:1px;
  background:linear-gradient(90deg, transparent, var(--c), rgba(0,245,212,0.4), var(--c), transparent);
  opacity:0.4;
}

.logo {
  font-family:var(--font-head); font-size:20px; font-weight:800;
  letter-spacing:8px; color:var(--c);
  text-shadow: 0 0 20px rgba(0,245,212,0.6), 0 0 60px rgba(0,245,212,0.2);
  position:relative;
}
.logo::before {
  content:'JARVIS';
  position:absolute; inset:0;
  color:var(--c2); opacity:0;
  animation:glitch 7s infinite;
  clip-path:polygon(0 30%, 100% 30%, 100% 50%, 0 50%);
  transform:translateX(-2px);
}
@keyframes glitch {
  0%,94%,100% { opacity:0; transform:translateX(-2px); }
  95% { opacity:0.6; transform:translateX(2px); }
  96% { opacity:0.4; transform:translateX(-3px); }
  97% { opacity:0; }
}

.logo-ver {
  font-family:var(--font-mono); font-size:8px; font-weight:400;
  color:rgba(0,245,212,0.3); letter-spacing:2px;
  display:block; margin-top:-2px;
}

.header-center {
  display:flex; align-items:center; gap:24px;
  font-family:var(--font-mono); font-size:9px; letter-spacing:2px;
  color:var(--text2);
}
.status-grp { display:flex; align-items:center; gap:7px; }
.status-dot {
  width:6px; height:6px; border-radius:50%; background:#00ff88;
  box-shadow: 0 0 8px #00ff88, 0 0 20px rgba(0,255,136,0.5);
  animation:dot-pulse 2.4s ease-in-out infinite;
}
@keyframes dot-pulse {
  0%,100% { transform:scale(1); opacity:1; }
  50% { transform:scale(0.7); opacity:0.5; }
}
.status-divider { width:1px; height:16px; background:var(--border); }
#statusText { color:rgba(0,245,212,0.4); }

.header-right { display:flex; align-items:center; gap:8px; }

.user-chip {
  display:flex; align-items:center; gap:9px;
  padding:5px 14px 5px 5px;
  border:1px solid var(--border);
  background:var(--glass);
  backdrop-filter:blur(8px);
  transition:border-color 0.2s;
}
.user-chip:hover { border-color:var(--border2); }
.user-av {
  width:26px; height:26px; border-radius:2px;
  background:linear-gradient(135deg, rgba(0,245,212,0.15), rgba(123,94,167,0.15));
  border:1px solid rgba(0,245,212,0.25);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-head); font-size:10px; font-weight:700; color:var(--c);
}
#userName {
  font-family:var(--font-head); font-size:10px; font-weight:600;
  letter-spacing:3px; color:rgba(0,245,212,0.6);
}

.hdr-btn {
  background:var(--glass); border:1px solid var(--border);
  color:var(--text2); padding:6px 14px;
  font-family:var(--font-head); font-size:9px; font-weight:600; letter-spacing:2px;
  cursor:pointer; transition:all 0.25s; position:relative; overflow:hidden;
}
.hdr-btn::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg, rgba(0,245,212,0.08), transparent);
  opacity:0; transition:opacity 0.25s;
}
.hdr-btn:hover { border-color:var(--c); color:var(--c); }
.hdr-btn:hover::before { opacity:1; }
.hdr-btn.active {
  border-color:var(--c); color:var(--c);
  background:rgba(0,245,212,0.08);
  box-shadow:var(--glow);
}
.hdr-btn.web-on {
  border-color:var(--c); color:var(--c);
  box-shadow: 0 0 18px rgba(0,245,212,0.3);
  background:rgba(0,245,212,0.07);
}

.logout-btn {
  background:var(--glass); border:1px solid rgba(255,45,120,0.2);
  color:rgba(255,45,120,0.4); padding:6px 14px;
  font-family:var(--font-head); font-size:9px; font-weight:600; letter-spacing:2px;
  cursor:pointer; transition:all 0.25s;
}
.logout-btn:hover {
  border-color:var(--c2); color:var(--c2);
  box-shadow:var(--glow2);
  background:rgba(255,45,120,0.06);
}

/* ── Chat Area ── */
#chat {
  flex:1; overflow-y:auto; padding:28px 32px;
  display:flex; flex-direction:column; gap:18px;
  scroll-behavior:smooth;
}
#chat::-webkit-scrollbar { width:2px; }
#chat::-webkit-scrollbar-thumb { background:rgba(0,245,212,0.18); }
#chat::-webkit-scrollbar-track { background:transparent; }

/* ── Boot Screen ── */
.boot {
  align-self:center; text-align:center; padding:60px 40px;
  animation:bootIn 1.2s cubic-bezier(0.16,1,0.3,1) both;
  max-width:480px;
}
@keyframes bootIn {
  from { opacity:0; transform:translateY(20px) scale(0.97); }
  to { opacity:1; transform:none; }
}
.boot-hex {
  width:72px; height:72px; margin:0 auto 28px;
  position:relative; display:flex; align-items:center; justify-content:center;
}
.boot-hex::before {
  content:''; position:absolute; inset:0;
  border:1px solid rgba(0,245,212,0.25);
  transform:rotate(45deg);
  animation:hexSpin 8s linear infinite;
}
.boot-hex::after {
  content:''; position:absolute; inset:8px;
  border:1px solid rgba(0,245,212,0.15);
  transform:rotate(45deg);
  animation:hexSpin 8s linear infinite reverse;
}
@keyframes hexSpin { to { transform:rotate(405deg); } }
.boot-icon { font-size:22px; position:relative; z-index:1; }

.boot-title {
  font-family:var(--font-head); font-size:28px; font-weight:800;
  letter-spacing:12px; color:var(--c);
  text-shadow: 0 0 40px rgba(0,245,212,0.5);
  margin-bottom:10px;
}
.boot-line {
  width:120px; height:1px; margin:16px auto;
  background:linear-gradient(90deg, transparent, var(--c), transparent);
}
.boot-sub {
  font-family:var(--font-mono); font-size:9px; letter-spacing:3px;
  color:rgba(0,245,212,0.3); line-height:2;
}
.boot-stat {
  margin-top:20px; display:flex; justify-content:center; gap:20px;
}
.boot-stat-item {
  font-family:var(--font-mono); font-size:8px; letter-spacing:2px;
  color:rgba(0,245,212,0.2);
}
.boot-stat-item span { color:rgba(0,245,212,0.5); display:block; font-size:10px; }

/* ── Messages ── */
.msg {
  display:flex; gap:12px; max-width:820px;
  animation:msgIn 0.4s cubic-bezier(0.16,1,0.3,1) both;
}
.msg.user { align-self:flex-end; flex-direction:row-reverse; }
.msg.jarvis { align-self:flex-start; }
@keyframes msgIn {
  from { opacity:0; transform:translateY(8px); }
  to { opacity:1; transform:none; }
}

.av {
  width:36px; height:36px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-head); font-size:8px; font-weight:700; letter-spacing:1px;
  position:relative; flex-direction:column; gap:1px;
}
.msg.user .av {
  background:linear-gradient(135deg, rgba(255,45,120,0.1), rgba(123,94,167,0.1));
  border:1px solid rgba(255,45,120,0.25); color:var(--c2);
  border-radius:2px;
}
.msg.jarvis .av {
  background:linear-gradient(135deg, rgba(0,245,212,0.07), rgba(0,100,200,0.05));
  border:1px solid var(--border); color:var(--c);
  border-radius:2px;
}
.av-label { font-size:7px; opacity:0.6; letter-spacing:0; }

.bubble {
  padding:14px 18px;
  font-family:var(--font-mono); font-size:12.5px; line-height:1.8;
  max-width:660px; position:relative;
}
.msg.user .bubble {
  background:linear-gradient(135deg, rgba(255,45,120,0.06) 0%, rgba(123,94,167,0.06) 100%);
  border:1px solid rgba(255,45,120,0.18);
  border-radius:2px 0 2px 2px; color:#f0b8cc;
}
.msg.jarvis .bubble {
  background:linear-gradient(135deg, rgba(0,245,212,0.04) 0%, rgba(0,60,120,0.08) 100%);
  border:1px solid var(--border);
  border-radius:0 2px 2px 2px; color:var(--text);
}
.msg.jarvis .bubble::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg, var(--c), transparent);
  opacity:0.3;
}
.msg.user .bubble::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(270deg, var(--c2), transparent);
  opacity:0.3;
}

.bubble-ts {
  display:block; margin-top:6px;
  font-size:8px; letter-spacing:2px;
  color:rgba(0,245,212,0.2); font-family:var(--font-head);
}
.msg.user .bubble-ts { text-align:right; color:rgba(255,45,120,0.25); }

.action-pill {
  margin-top:10px; padding:5px 12px;
  background:rgba(0,255,136,0.06);
  border:1px solid rgba(0,255,136,0.18);
  border-left:2px solid #00ff88;
  color:#00ff88; font-size:10px; letter-spacing:1.5px;
  font-family:var(--font-head); font-weight:600;
  display:inline-flex; align-items:center; gap:6px;
}

/* ── Typing ── */
.typing {
  display:flex; align-items:center; gap:5px;
  padding:16px 18px;
  background:linear-gradient(135deg, rgba(0,245,212,0.04), rgba(0,60,120,0.08));
  border:1px solid var(--border);
  border-radius:0 2px 2px 2px;
}
.typing span {
  width:4px; height:4px; border-radius:50%; background:var(--c);
  animation:ty 1.4s ease-in-out infinite;
  box-shadow: 0 0 6px var(--c);
}
.typing span:nth-child(2) { animation-delay:0.2s; }
.typing span:nth-child(3) { animation-delay:0.4s; }
@keyframes ty {
  0%,80%,100% { transform:scale(0.6); opacity:0.25; }
  40% { transform:scale(1.2); opacity:1; }
}

/* ── Footer ── */
footer {
  padding:16px 28px 20px;
  border-top:1px solid var(--border);
  background:linear-gradient(0deg, rgba(2,9,20,0.98) 0%, rgba(3,12,28,0.92) 100%);
  backdrop-filter:blur(20px);
  position:relative;
}
footer::before {
  content:''; position:absolute; top:0; left:5%; right:5%; height:1px;
  background:linear-gradient(90deg, transparent, rgba(0,245,212,0.3), transparent);
}

.input-wrap {
  display:flex; gap:0; align-items:stretch;
  border:1px solid var(--border);
  background:rgba(0,245,212,0.02);
  transition:border-color 0.25s, box-shadow 0.25s;
  position:relative;
}
.input-wrap:focus-within {
  border-color:rgba(0,245,212,0.35);
  box-shadow: 0 0 0 1px rgba(0,245,212,0.08), 0 0 40px rgba(0,245,212,0.1);
}
.input-wrap::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg, transparent, rgba(0,245,212,0.2), transparent);
  opacity:0; transition:opacity 0.25s;
}
.input-wrap:focus-within::before { opacity:1; }

.pfx {
  padding:12px 14px; font-family:var(--font-mono); font-size:13px;
  color:rgba(0,245,212,0.35); background:rgba(0,245,212,0.04);
  border-right:1px solid var(--border);
  display:flex; align-items:center;
  white-space:nowrap; letter-spacing:2px;
}

#inp {
  flex:1; background:transparent; border:none;
  color:var(--text); font-family:var(--font-mono); font-size:12.5px;
  padding:12px 16px; outline:none; min-width:0;
}
#inp::placeholder { color:rgba(0,245,212,0.18); }

.send {
  background:linear-gradient(135deg, rgba(0,245,212,0.12), rgba(0,200,180,0.08));
  border:none; border-left:1px solid var(--border);
  color:var(--c); padding:12px 24px;
  font-family:var(--font-head); font-size:10px; font-weight:700; letter-spacing:3px;
  cursor:pointer; transition:all 0.25s;
  position:relative; overflow:hidden;
  white-space:nowrap;
}
.send::before {
  content:''; position:absolute; inset:0;
  background:linear-gradient(135deg, rgba(0,245,212,0.15), transparent);
  opacity:0; transition:opacity 0.25s;
}
.send:hover { color:white; }
.send:hover::before { opacity:1; }
.send:disabled { opacity:0.3; cursor:not-allowed; }
.send:not(:disabled) { box-shadow:inset 0 0 20px rgba(0,245,212,0.05); }

.hints {
  display:flex; gap:0; margin-top:10px; flex-wrap:wrap;
  font-family:var(--font-head); font-size:9px;
}
.hint-label { color:rgba(0,245,212,0.15); letter-spacing:2px; padding:4px 0; margin-right:10px; }
.hint {
  color:rgba(0,245,212,0.22); cursor:pointer;
  transition:color 0.2s; letter-spacing:1px;
  padding:4px 10px; border:1px solid transparent;
  transition:all 0.2s;
}
.hint:hover {
  color:rgba(0,245,212,0.7);
  border-color:var(--border);
  background:var(--glass);
}

/* ── Scan Line Anim ── */
@keyframes scanAnim {
  0% { transform:translateY(-100%); }
  100% { transform:translateY(100vh); }
}
.scan-beam {
  position:fixed; left:0; right:0; height:2px;
  background:linear-gradient(90deg, transparent, rgba(0,245,212,0.06), transparent);
  z-index:2; pointer-events:none;
  animation:scanAnim 6s linear infinite;
  opacity:0.5;
}
</style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>

<canvas id="bg"></canvas>
<div class="noise"></div>
<div class="scanlines"></div>
<div class="chromatic"></div>
<div class="vignette"></div>
<div class="scan-beam"></div>

<div class="hud">
  <div class="hc tl"></div>
  <div class="hc tr"></div>
  <div class="hc bl"></div>
  <div class="hc br"></div>
</div>

<div class="side-meter left">
  <div class="meter-bar"></div><div class="meter-bar"></div>
  <div class="meter-bar"></div><div class="meter-bar"></div>
  <div class="meter-bar"></div><div class="meter-bar"></div>
  <div class="meter-bar"></div>
</div>
<div class="side-meter right">
  <div class="meter-bar"></div><div class="meter-bar"></div>
  <div class="meter-bar"></div><div class="meter-bar"></div>
  <div class="meter-bar"></div><div class="meter-bar"></div>
  <div class="meter-bar"></div>
</div>

<div class="app">
  <header>
    <div>
      <div class="logo">JARVIS</div>
      <span class="logo-ver">v4.2.1 — NEURAL INTERFACE</span>
    </div>

    <div class="header-center">
      <div class="status-grp">
        <div class="status-dot"></div>
        <span>ONLINE</span>
      </div>
      <div class="status-divider"></div>
      <span id="statusText">INITIALIZING...</span>
      <div class="status-divider"></div>
      <span id="pingText">LATENCY: --ms</span>
    </div>

    <div class="header-right">
      <div class="user-chip">
        <div class="user-av" id="userInitial">OP</div>
        <span id="userName">OPERATOR</span>
      </div>
      <button class="hdr-btn" id="webBtn" onclick="toggleWeb()">⬡ WEB: OFF</button>
      <button class="hdr-btn" onclick="clearChat()">⟲ CLEAR</button>
      <button class="logout-btn" onclick="logout()">◈ LOGOUT</button>
    </div>
  </header>

  <div id="chat">
    <div class="boot">
      <div class="boot-hex">
        <div class="boot-icon">◈</div>
      </div>
      <div class="boot-title">JARVIS</div>
      <div class="boot-line"></div>
      <div class="boot-sub">
        JUST A RATHER VERY INTELLIGENT SYSTEM<br>
        ALL SUBSYSTEMS NOMINAL — STANDING BY
      </div>
      <div class="boot-stat">
        <div class="boot-stat-item"><span>∞</span>MEMORY</div>
        <div class="boot-stat-item"><span>100%</span>POWER</div>
        <div class="boot-stat-item"><span>LIVE</span>NEURAL</div>
      </div>
    </div>
  </div>

  <footer>
    <div class="input-wrap">
      <div class="pfx">&gt;_</div>
      <input id="inp" type="text" placeholder="Speak your command..." autocomplete="off"/>
      <button class="send" id="sendBtn" onclick="send()">TRANSMIT</button>
    </div>
    <div class="hints">
      <span class="hint-label">QUICK:</span>
      <span class="hint" onclick="useHint(this)">open chrome</span>
      <span class="hint" onclick="useHint(this)">open downloads</span>
      <span class="hint" onclick="useHint(this)">latest news today</span>
      <span class="hint" onclick="useHint(this)">what's the weather in Delhi?</span>
      <span class="hint" onclick="useHint(this)">run ipconfig</span>
    </div>
  </footer>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────
const API = "https://jarvis-backend-1-jttj.onrender.com";

// ── Custom Cursor ─────────────────────────────────────────────────
const cur = document.getElementById("cursor");
const ring = document.getElementById("cursor-ring");
let mx=0,my=0,rx=0,ry=0;

document.addEventListener("mousemove", e => {
  mx = e.clientX; my = e.clientY;
  cur.style.left = mx-4+"px";
  cur.style.top  = my-4+"px";
  ring.style.left = mx+"px";
  ring.style.top  = my+"px";
});

document.querySelectorAll("button,input,.hint").forEach(el => {
  el.addEventListener("mouseenter", () => ring.classList.add("hover"));
  el.addEventListener("mouseleave", () => ring.classList.remove("hover"));
});

// ── Canvas Background ─────────────────────────────────────────────
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");
let W,H,pts=[];

function resize() {
  W = canvas.width = innerWidth;
  H = canvas.height = innerHeight;
  initPts();
}

function initPts() {
  pts = [];
  const n = Math.floor(W*H/14000);
  for(let i=0;i<n;i++) {
    pts.push({
      x:Math.random()*W, y:Math.random()*H,
      vx:(Math.random()-.5)*0.22, vy:(Math.random()-.5)*0.22,
      a:Math.random()*0.35+0.08,
      r:Math.random()*1.2+0.4,
      hue:Math.random()>0.85 ? 320 : 174
    });
  }
}

let tick=0;
function draw() {
  tick++;
  ctx.clearRect(0,0,W,H);

  // Grid
  ctx.strokeStyle="rgba(0,245,212,0.02)";
  ctx.lineWidth=1;
  const gs=80;
  for(let x=0;x<W;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  // Gradient orbs
  const grad1 = ctx.createRadialGradient(W*0.2,H*0.3,0,W*0.2,H*0.3,W*0.35);
  grad1.addColorStop(0,"rgba(0,245,212,0.04)");
  grad1.addColorStop(1,"transparent");
  ctx.fillStyle=grad1; ctx.fillRect(0,0,W,H);

  const grad2 = ctx.createRadialGradient(W*0.8,H*0.7,0,W*0.8,H*0.7,W*0.3);
  grad2.addColorStop(0,"rgba(123,94,167,0.04)");
  grad2.addColorStop(1,"transparent");
  ctx.fillStyle=grad2; ctx.fillRect(0,0,W,H);

  // Particles & connections
  pts.forEach((p,i) => {
    p.x += p.vx; p.y += p.vy;
    if(p.x<0||p.x>W) p.vx*=-1;
    if(p.y<0||p.y>H) p.vy*=-1;

    const pulse = 0.5 + 0.5*Math.sin(tick*0.02+i*0.5);
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    const hsl = p.hue===174 ? `rgba(0,245,212,${p.a*pulse})` : `rgba(255,45,120,${p.a*pulse*0.6})`;
    ctx.fillStyle = hsl;
    ctx.fill();

    for(let j=i+1;j<pts.length;j++) {
      const dx=p.x-pts[j].x, dy=p.y-pts[j].y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<120) {
        const a=(1-d/120)*0.07*pulse;
        ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(pts[j].x,pts[j].y);
        ctx.strokeStyle=`rgba(0,245,212,${a})`; ctx.lineWidth=0.5; ctx.stroke();
      }
    }
  });

  requestAnimationFrame(draw);
}
window.addEventListener("resize",resize); resize(); draw();

// ── Clock / Status ────────────────────────────────────────────────
function pad(n){return String(n).padStart(2,'0');}
setInterval(()=>{
  const t=new Date();
  const s=`${pad(t.getHours())}:${pad(t.getMinutes())}:${pad(t.getSeconds())}`;
  document.getElementById("statusText").textContent=s;
},1000);

// ── Auth ──────────────────────────────────────────────────────────
document.getElementById("userName").textContent = "OPERATOR";
document.getElementById("userInitial").textContent = "OP";

function logout() {
  // firebase.auth().signOut().then(()=>window.location.href="login.html");
  window.location.href="login.html";
}

// ── Chat State ────────────────────────────────────────────────────
const chatEl = document.getElementById("chat");
const inp = document.getElementById("inp");
const sendBtn = document.getElementById("sendBtn");
let webSearch = false;

inp.addEventListener("keydown", e=>{ if(e.key==="Enter") send(); });

function toggleWeb() {
  webSearch = !webSearch;
  const b = document.getElementById("webBtn");
  b.textContent = `⬡ WEB: ${webSearch?"ON":"OFF"}`;
  b.classList.toggle("active", webSearch);
  b.classList.toggle("web-on", webSearch);
}

function useHint(el) { inp.value = el.textContent; inp.focus(); }

async function clearChat() {
  await fetch(`${API}/history`,{method:"DELETE"}).catch(()=>{});
  chatEl.innerHTML = `
    <div class="boot">
      <div class="boot-hex"><div class="boot-icon">◈</div></div>
      <div class="boot-title">JARVIS</div>
      <div class="boot-line"></div>
      <div class="boot-sub">MEMORY CLEARED — AWAITING INPUT</div>
    </div>`;
}

function timestamp() {
  const t=new Date();
  return `${pad(t.getHours())}:${pad(t.getMinutes())}:${pad(t.getSeconds())}`;
}

function fmt(t) {
  return t
    .replace(/\*\*(.*?)\*\*/g,'<strong style="color:var(--c);font-weight:700">$1</strong>')
    .replace(/`(.*?)`/g,'<code style="background:rgba(0,245,212,0.09);padding:2px 7px;border:1px solid rgba(0,245,212,0.15);font-size:11px;color:#7bf3e8">$1</code>')
    .replace(/\n/g,'<br>');
}

function addMsg(role, text, action) {
  const m = document.createElement("div");
  m.className = `msg ${role}`;

  const av = document.createElement("div");
  av.className = "av";
  av.innerHTML = role==="user"
    ? `<span>YOU</span><span class="av-label">USR</span>`
    : `<span>J.A.R</span><span class="av-label">AI</span>`;

  const b = document.createElement("div");
  b.className = "bubble";
  b.innerHTML = fmt(text);

  if(action) {
    const pill = document.createElement("div");
    pill.className = "action-pill";
    pill.textContent = `⚡ ${action}`;
    b.appendChild(pill);
  }

  const ts = document.createElement("span");
  ts.className = "bubble-ts";
  ts.textContent = timestamp();
  b.appendChild(ts);

  m.appendChild(av);
  m.appendChild(b);
  chatEl.appendChild(m);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function showTyping() {
  const m = document.createElement("div");
  m.className = "msg jarvis"; m.id = "typing";
  const av = document.createElement("div");
  av.className = "av";
  av.innerHTML = `<span>J.A.R</span><span class="av-label">AI</span>`;
  const b = document.createElement("div");
  b.className = "typing";
  b.innerHTML = "<span></span><span></span><span></span>";
  m.appendChild(av); m.appendChild(b);
  chatEl.appendChild(m);
  chatEl.scrollTop = chatEl.scrollHeight;
}
function hideTyping() {
  const t = document.getElementById("typing");
  if(t) t.remove();
}

async function send() {
  const text = inp.value.trim();
  if(!text) return;
  inp.value = "";
  sendBtn.disabled = true;

  addMsg("user", text);
  showTyping();

  const t0 = Date.now();
  try {
    const r = await fetch(`${API}/chat`, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:text, use_web_search:webSearch})
    });
    const latency = Date.now()-t0;
    document.getElementById("pingText").textContent = `LATENCY: ${latency}ms`;
    hideTyping();
    if(!r.ok){
      const e = await r.json();
      addMsg("jarvis", `❌ Error: ${e.detail}`);
    } else {
      const d = await r.json();
      addMsg("jarvis", d.reply, d.action_taken);
    }
  } catch(e) {
    hideTyping();
    addMsg("jarvis","❌ Cannot reach backend.\n\nMake sure it's running on **localhost:8000** or update the `API` URL at the top of this file.");
  }

  sendBtn.disabled = false;
  inp.focus();
}
</script>
</body>
</html>
